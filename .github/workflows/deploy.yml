name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Warn-only: missing/stale translations fall back to English on the
      # live site. Run /sync-translations locally to update them.
      - name: Translation status
        run: python3 scripts/translation_status.py --quiet || true

      - name: Deploy
        run: mkdocs gh-deploy --force
