site_name: Agentic Automation Workshop
site_url: https://s-shumilov.github.io/AgenticPracticeCourse/
site_description: Hands-on learner's handbook for the UiPath Agentic Practice Workshop
site_author: Sergey Shumilov

theme:
  name: material
  logo: assets/images/Partner Success Logo.png
  favicon: assets/images/favicon.png
  font:
    text: Inter
  palette:
    scheme: default
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

hooks:
  - hooks/split_cols.py

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Categorizing Incidents:
    - Overview: categorizing-incidents/index.md
    - LLM with Context: categorizing-incidents/llm-with-context.md
    - Tools and Escalations: categorizing-incidents/tools-and-escalations.md
  - Invoice Matching with IXP:
    - Overview: invoice-matching-ixp/0-index.md
    - 1. Create BPMN Process: invoice-matching-ixp/1-create-bpmn.md
    - 2. Configure a Robot: invoice-matching-ixp/2-configure-robot.md
    - 3. Configure an Agent: invoice-matching-ixp/3-configure-agent.md
    - 4. Configure Human Validation: invoice-matching-ixp/4-configure-human-validation.md
    - 5. Configure API Integration: invoice-matching-ixp/5-configure-api.md
    - You did it!: invoice-matching-ixp/you-did-it.md
  - Next Steps: next-steps.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false
